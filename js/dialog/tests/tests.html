<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Tests</title>
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="https://unpkg.com/mocha/mocha.css" />

<body>
    <div id="mocha"></div>

    <script src="https://unpkg.com/chai@4.4.1/chai.js"></script>
    <script src="https://unpkg.com/mocha@10.2.0/mocha.js"></script>

    <script class="mocha-init">
        mocha.setup('bdd');
    </script>

    <script type=module>
    import * as dialog from '../dialog.js';

    // returns the just-opened dialog of the given root (default: document), then removes it
    function pop(root = document) {
        const el = root.querySelector('dialog.u2x-modal');
        const html = el.querySelector('form').innerHTML;
        el.remove();
        return {el, html};
    }

    describe('dialog body', () => {
        it('escapes html', () => {
            dialog.alert('a <b>x</b>');
            chai.expect(pop().html).to.contain('a &lt;b&gt;x&lt;/b&gt;');
        });
        it('keeps line breaks as <br>', () => {
            dialog.alert('line1\nline2');
            chai.expect(pop().html).to.contain('line1<br>line2');
        });
        it('object body stays raw html', () => {
            dialog.alert({body:'<b>x</b>'});
            chai.expect(pop().html).to.contain('<b>x</b>');
        });
    });

    describe('lang', () => {
        it('option translates the Cancel button', () => {
            dialog.confirm({body:'?', lang:'de'});
            chai.expect(pop().html).to.contain('Abbrechen');
        });
    });

    describe('shadow DOM', () => {
        const host = document.body.appendChild(document.createElement('div'));
        const root = host.attachShadow({mode:'open'});

        it('A: root option opens inside the shadow root + adopts styles', () => {
            dialog.alert({body:'hi', root});
            chai.expect(pop(root).el.open).to.equal(true);
            chai.expect(root.adoptedStyleSheets.length).to.be.above(0);
        });
        it('C: scope(defaults) binds root + lang, strings still escaped', () => {
            const m = dialog.scope({root, lang:'de'});
            m.confirm('a <b>x</b>');
            const {el, html} = pop(root);
            chai.expect(el.open).to.equal(true);          // opened in shadow root
            chai.expect(html).to.contain('a &lt;b&gt;');  // string escaped, not raw
            chai.expect(html).to.contain('Abbrechen');    // lang default applied
        });
    });
    </script>
    <script class="mocha-exec" type=module>
      mocha.run();
    </script>
</body>

</html>
