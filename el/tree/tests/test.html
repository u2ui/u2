<section>

    <u2-code element=demo editable trim> </u2-code>

    <u2-code trim editable>
    <style class=main>
    u2-tree::part(row) {
        border-radius:.3rem;
    }
    u2-tree:focus::part(row) {
        outline:.1rem solid var(--color);
        background:transparent;
    }
    u2-tree[aria-selected=true]::part(row) {
        background:#00000008;
    }
    u2-tree::part(row):hover {
        background:#00000004;
    }
    </style>
    </u2-code>

    <u2-code trim>
    <script type=module class=main>
    /* load dynamic items */
    document.addEventListener('u2-tree-expand', event => {
        const treeItem = event.target;
        
        // if load is present, it requires a (async) function that loads the items
        // (indicated by `aria-expanded=false` and `aria-live=off`)
        //event.load?.(loadItems(treeItem)); zzz
        event.load?.(loadItems);
    });
    const loadItems = async (item) => {
        await delay(600);
        item.innerHTML += '<u2-tree><span slot=icon>🖼</span>Dynamic File 1</u2-tree>';
        await delay(300);
        item.innerHTML += '<u2-tree><span slot=icon>📄</span>Document</u2-tree>';
        await delay(300);
        item.innerHTML += '<u2-tree aria-expanded=false aria-live=off>Folder</u2-tree>';
    }
    </script>
    </u2-code>

    <script>
        delay = function(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>

</section>
